<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shilling-A-Minute | Win Big</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 15px; border: 2px solid #4CAF50; }
        h1 { color: #4CAF50; margin-bottom: 5px; }
        .timer { font-size: 3rem; font-weight: bold; color: #ffeb3b; margin: 20px 0; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; background: #3d3d3d; padding: 10px; border-radius: 10px; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; font-size: 1rem; }
        button { width: 85%; padding: 15px; background: #4CAF50; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        button:hover { background: #45a049; }
        .winner-box { margin-top: 20px; padding: 10px; border-top: 1px solid #555; font-style: italic; color: #aaa; }
        #status-msg { margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Shilling-A-Minute</h1>
        <p>Entry: 1 KES | Draw every 60s</p>
        
        <div class="timer" id="timer">00:60</div>

        <div class="stats">
            <div>Players: <span id="player-count">0</span></div>
            <div>Jackpot: <span id="jackpot">0</span> KES</div>
        </div>

        <input type="number" id="phone" placeholder="2547XXXXXXXX" required>
        <button onclick="joinGame()" id="join-btn">JOIN GAME</button>
        <p id="status-msg"></p>

        <div class="winner-box">
            Last Winner: <span id="last-winner">Waiting...</span>
        </div>
    </div>

    <script>
        // Update game status every second
        async function updateStatus() {
            try {
                const res = await fetch('/game-status');
                const data = await res.json();
                
                document.getElementById('timer').innerText = `00:${data.timeLeft < 10 ? '0' : ''}${data.timeLeft}`;
                document.getElementById('player-count').innerText = data.activePlayers;
                document.getElementById('jackpot').innerText = data.jackpot;
                document.getElementById('last-winner').innerText = data.lastWinner;
            } catch (err) {
                console.error("Error fetching status");
            }
        }

        async function joinGame() {
            const phone = document.getElementById('phone').value;
            const btn = document.getElementById('join-btn');
            const msg = document.getElementById('status-msg');

            if (!phone || phone.length < 10) {
                alert("Please enter a valid M-Pesa number (254...)");
                return;
            }

            btn.disabled = true;
            btn.innerText = "PROCESSING...";
            msg.innerText = "Checking M-Pesa connection...";

            try {
                const res = await fetch('/join', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: phone })
                });
                
                const data = await res.json();
                if (data.success) {
                    msg.style.color = "#4CAF50";
                    msg.innerText = "✔ Prompt sent! Check your phone.";
                } else {
                    msg.style.color = "#ff5252";
                    msg.innerText = "❌ Error sending prompt. Try again.";
                }
            } catch (err) {
                msg.innerText = "❌ Network error. Is the server live?";
            } finally {
                btn.disabled = false;
                btn.innerText = "JOIN GAME";
            }
        }

        setInterval(updateStatus, 1000);
    </script>
</body>
</html>
