<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shilling-A-Minute</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { border: 1px solid #333; padding: 20px; border-radius: 15px; margin: 10px auto; max-width: 400px; }
        #timer { font-size: 80px; font-weight: bold; color: #4CAF50; margin: 20px 0; }
        input { padding: 15px; width: 80%; border-radius: 5px; border: none; margin-bottom: 10px; font-size: 18px; }
        button { background: #4CAF50; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; width: 90%; }
        .status { color: #888; font-size: 14px; margin-top: 10px; }
        .winner-box { background: #111; padding: 15px; border-radius: 10px; border: 1px dashed #4CAF50; }
    </style>
</head>
<body>

    <h1>Shilling-A-Minute</h1>
    <p>Survivor-Built. Kenya-Proud. KE</p>

    <div class="card">
        <p>NEXT DRAW IN</p>
        <div id="timer">60s</div>
    </div>

    <div class="card">
        <input type="text" id="phone" placeholder="2547XXXXXXXX" value="254708374149">
        <button onclick="joinGame()" id="btn-text">Join Game (1 KES)</button>
        <div class="status" id="status-msg">System Status: <span style="color:#4CAF50">● LIVE</span></div>
    </div>

    <div class="card winner-box">
        <p>🏆 RECENT WINNER 🏆</p>
        <h3 id="last-winner">Waiting for draw...</h3>
        <p id="player-count">0 Active Players</p>
    </div>

    <script>
        // 1. THE ACTION: SEND PAYMENT PROMPT
       async function joinGame() {
    const phone = document.getElementById('phone').value;
    const btn = document.getElementById('btn-text'); // This is your button!
    const statusMsg = document.getElementById('status-msg');

    // 🛑 STAGE 1: LOCK THE BUTTON
    btn.disabled = true; 
    btn.innerText = "Processing Prompt...";
    statusMsg.innerText = "Check your phone for the M-Pesa popup...";

    try {
        const response = await fetch('/join', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone })
        });

        const data = await response.json();
        
        if (data.success) {
            statusMsg.innerText = "Prompt Sent! Enter your PIN.";
        } else {
            statusMsg.innerText = "Error: " + (data.error || "Failed to send prompt.");
        }
    } catch (err) {
        statusMsg.innerText = "Network error. Try again.";
    } finally {
        // 🛑 STAGE 2: UNLOCK AFTER 5 SECONDS
        setTimeout(() => {
            btn.disabled = false;
            btn.innerText = "Join Game (1 KES)";
        }, 5000); 
    }
}
        // 2. THE HEARTBEAT: UPDATE TIMER & WINNER EVERY SECOND
        async function updateGameStatus() {
            try {
                const response = await fetch('/game-status');
                const data = await response.json();

                // Update UI elements
                document.getElementById('timer').innerText = `${data.timeLeft}s`;
                document.getElementById('last-winner').innerText = data.lastWinner;
                document.getElementById('player-count').innerText = `${data.activePlayers} Active Players`;

                // Visual warning when time is low
                if (data.timeLeft <= 10) {
                    document.getElementById('timer').style.color = "#ff4444";
                } else {
                    document.getElementById('timer').style.color = "#4CAF50";
                }
            } catch (err) {
                console.log("Waiting for server...");
            }
        }

        // Start the loop
        setInterval(updateGameStatus, 1000);
    </script>
</body>
</html>
